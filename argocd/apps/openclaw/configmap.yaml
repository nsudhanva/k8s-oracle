apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config
  namespace: default
data:
  openclaw.json: |
    {
      "gateway": {
        "mode": "local",
        "port": 18789,
        "controlUi": {
          "allowedOrigins": [
            "https://claw.k8s.sudhanva.me",
            "http://localhost:18789",
            "http://127.0.0.1:18789"
          ]
        }
      },
      "browser": {
        "enabled": true,
        "headless": false,
        "noSandbox": true,
        "defaultProfile": "remote",
        "ssrfPolicy": {
          "dangerouslyAllowPrivateNetwork": true
        },
        "profiles": {
          "remote": {
            "cdpUrl": "http://chromium-local:9223",
            "color": "#FF4500"
          }
        }
      },
      "models": {
        "mode": "merge",
        "providers": {
          "google": {
            "baseUrl": "https://generativelanguage.googleapis.com/v1beta",
            "apiKey": "${GEMINI_API_KEY}",
            "api": "google-generative-ai",
            "models": [
              {
                "id": "gemini-3.1-flash-lite-preview",
                "name": "Gemini 3.1 Flash Lite",
                "contextWindow": 131072,
                "maxTokens": 8192
              }
            ]
          }
        }
      },
      "agents": {
        "defaults": {
          "model": {
            "primary": "google/gemini-3.1-flash-lite-preview"
          },
          "timeoutSeconds": 300,
          "compaction": {
            "mode": "safeguard",
            "reserveTokensFloor": 24000
          },
          "contextLimits": {
            "toolResultMaxChars": 12000
          },
          "bootstrapMaxChars": 20000,
          "bootstrapTotalMaxChars": 40000,
          "heartbeat": {
            "every": "15m",
            "target": "last"
          }
        }
      },
      "channels": {
        "telegram": {
          "enabled": true,
          "dmPolicy": "pairing"
        }
      },
      "session": {
        "scope": "per-sender",
        "dmScope": "per-peer",
        "reset": {
          "mode": "idle",
          "idleMinutes": 30
        },
        "maintenance": {
          "mode": "enforce",
          "pruneAfter": "7d",
          "maxEntries": 100
        }
      },
      "plugins": {
        "entries": {
          "memory-core": {
            "enabled": true,
            "config": {
              "dreaming": { "enabled": true }
            }
          },
          "duckduckgo": {
            "enabled": true
          }
        }
      },
      "messages": {
        "ackReaction": "eyes",
        "ackReactionScope": "direct",
        "queue": {
          "mode": "collect",
          "debounceMs": 1500
        }
      },
      "commands": {
        "native": false,
        "nativeSkills": "auto",
        "text": true
      }
    }
