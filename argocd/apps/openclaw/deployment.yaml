apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openclaw-home
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
  storageClassName: oci-bv
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config
  namespace: default
data:
  openclaw.json: |
    {
      "gateway": {
        "mode": "local",
        "port": 18789
      },
      "browser": {
        "executablePath": "/home/node/.cache/ms-playwright/chromium-1217/chrome-linux/chrome",
        "headless": true
      },
      "models": {
        "mode": "merge",
        "providers": {
          "google": {
            "baseUrl": "https://generativelanguage.googleapis.com/v1beta",
            "apiKey": "${GEMINI_API_KEY}",
            "api": "google-generative-ai",
            "models": [
              {
                "id": "gemini-3.1-flash-lite-preview",
                "name": "Gemini 3.1 Flash Lite",
                "contextWindow": 131072,
                "maxTokens": 8192
              }
            ]
          }
        }
      },
      "agents": {
        "defaults": {
          "model": {
            "primary": "google/gemini-3.1-flash-lite-preview"
          },
          "timeoutSeconds": 300
        }
      },
      "channels": {
        "telegram": {
          "enabled": true,
          "dmPolicy": "pairing"
        }
      },
      "session": {
        "scope": "per-sender",
        "dmScope": "per-peer",
        "reset": {
          "mode": "idle",
          "idleMinutes": 120
        }
      },
      "plugins": {
        "entries": {
          "memory-core": {
            "enabled": true,
            "config": {
              "dreaming": { "enabled": true }
            }
          }
        }
      },
      "messages": {
        "ackReaction": "eyes",
        "ackReactionScope": "direct",
        "queue": {
          "mode": "collect",
          "debounceMs": 1500
        }
      },
      "commands": {
        "native": true,
        "nativeSkills": "auto",
        "text": true
      }
    }
  AGENTS.md: |
    Be concise.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: default
  labels:
    app: openclaw
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: openclaw
  template:
    metadata:
      labels:
        app: openclaw
    spec:
      securityContext:
        fsGroup: 1000
        runAsUser: 1000
        runAsGroup: 1000
      initContainers:
        - name: copy-config
          image: ghcr.io/nsudhanva/openclaw:latest
          command:
            - sh
            - -c
            - |
              mkdir -p /home/node/.openclaw
              cp /config/openclaw.json /home/node/.openclaw/openclaw.json
              cp /config/AGENTS.md /home/node/.openclaw/AGENTS.md
              rm -f /home/node/.openclaw/agents/main/agent/models.json
              TG_TOKEN=$(cat /secrets/telegram-bot-token)
              export TG_TOKEN
              node -e "
              const fs = require('fs');
              const cfg = JSON.parse(fs.readFileSync('/home/node/.openclaw/openclaw.json'));
              cfg.channels.telegram.botToken = process.env.TG_TOKEN;
              if (!cfg.meta) cfg.meta = {};
              cfg.meta.lastTouchedVersion = '2026.4.9';
              fs.writeFileSync('/home/node/.openclaw/openclaw.json', JSON.stringify(cfg, null, 2));
              " || true
          env:
            - name: HOME
              value: /home/node
            - name: OPENCLAW_CONFIG_DIR
              value: /home/node/.openclaw
          volumeMounts:
            - name: home
              mountPath: /home/node
            - name: config
              mountPath: /config
            - name: telegram-token
              mountPath: /secrets
              readOnly: true
            - name: tmp
              mountPath: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      containers:
        - name: openclaw
          image: ghcr.io/nsudhanva/openclaw:latest
          ports:
            - containerPort: 18789
              name: http
          env:
            - name: HOME
              value: /home/node
            - name: OPENCLAW_CONFIG_DIR
              value: /home/node/.openclaw
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: gemini-api-key
                  key: api-key
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: gateway-token
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "4Gi"
              cpu: "2000m"
          volumeMounts:
            - name: home
              mountPath: /home/node
            - name: tmp
              mountPath: /tmp
            - name: telegram-token
              mountPath: /secrets
              readOnly: true
          startupProbe:
            exec:
              command: ["wget", "-q", "--spider", "http://127.0.0.1:18789/healthz"]
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            exec:
              command: ["wget", "-q", "--spider", "http://127.0.0.1:18789/healthz"]
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["wget", "-q", "--spider", "http://127.0.0.1:18789/readyz"]
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: home
          persistentVolumeClaim:
            claimName: openclaw-home
        - name: tmp
          emptyDir: {}
        - name: config
          configMap:
            name: openclaw-config
        - name: telegram-token
          secret:
            secretName: telegram-bot-token
