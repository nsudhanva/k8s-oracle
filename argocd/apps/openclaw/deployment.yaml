apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openclaw-home
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
  storageClassName: oci-bv
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config
  namespace: default
data:
  openclaw.json: |
    {
      "gateway": {
        "mode": "local",
        "port": 18789,
        "controlUi": {
          "allowedOrigins": [
            "https://claw.k8s.sudhanva.me",
            "http://localhost:18789",
            "http://127.0.0.1:18789"
          ]
        }
      },
      "browser": {
        "enabled": true,
        "headless": false,
        "noSandbox": true,
        "defaultProfile": "remote",
        "ssrfPolicy": {
          "dangerouslyAllowPrivateNetwork": true
        },
        "profiles": {
          "remote": {
            "cdpUrl": "http://chromium-local:9223",
            "color": "#FF4500"
          }
        }
      },
      "models": {
        "mode": "merge",
        "providers": {
          "google": {
            "baseUrl": "https://generativelanguage.googleapis.com/v1beta",
            "apiKey": "${GEMINI_API_KEY}",
            "api": "google-generative-ai",
            "models": [
              {
                "id": "gemini-3.1-flash-lite-preview",
                "name": "Gemini 3.1 Flash Lite",
                "contextWindow": 131072,
                "maxTokens": 8192
              }
            ]
          }
        }
      },
      "agents": {
        "defaults": {
          "model": {
            "primary": "google/gemini-3.1-flash-lite-preview"
          },
          "timeoutSeconds": 300,
          "compaction": {
            "mode": "safeguard",
            "reserveTokensFloor": 24000
          },
          "contextLimits": {
            "toolResultMaxChars": 12000
          },
          "bootstrapMaxChars": 10000,
          "bootstrapTotalMaxChars": 40000
        }
      },
      "channels": {
        "telegram": {
          "enabled": true,
          "dmPolicy": "pairing"
        }
      },
      "session": {
        "scope": "per-sender",
        "dmScope": "per-peer",
        "reset": {
          "mode": "idle",
          "idleMinutes": 30
        },
        "maintenance": {
          "mode": "enforce",
          "pruneAfter": "7d",
          "maxEntries": 100
        }
      },
      "plugins": {
        "entries": {
          "memory-core": {
            "enabled": true,
            "config": {
              "dreaming": { "enabled": true }
            }
          }
        }
      },
      "messages": {
        "ackReaction": "eyes",
        "ackReactionScope": "direct",
        "queue": {
          "mode": "collect",
          "debounceMs": 1500
        }
      },
      "commands": {
        "native": true,
        "nativeSkills": "auto",
        "text": true
      }
    }
  AGENTS.md: |
    Be concise and helpful. You are Sudhanva's personal AI assistant running on a Kubernetes cluster.

    ## Important Rules
    - All tools listed in TOOLS.md are pre-authenticated. NEVER attempt OAuth, login, or auth flows.
    - For all `gog` commands, always pass `--account nsudhanva@gmail.com`.
    - Prefer `web_fetch` for quick lookups. Use the browser tool only when JavaScript rendering is needed.
    - Keep responses short unless asked for detail.
    - ALWAYS run `date` to get the current date and time before creating calendar events, scheduling, or any time-sensitive operations. The timezone is America/New_York (Eastern Time).
  TOOLS.md: |
    # Authenticated Tools

    All tools below are pre-authenticated and ready to use. Do NOT run any auth/login commands.

    ## Google Workspace CLI (gws)
    Pre-authenticated via credentials at /home/node/.config/gws/credentials.json.
    GOOGLE_WORKSPACE_CLI_KEYRING_BACKEND=file is set.
    Covers ALL Google Workspace APIs. See: https://github.com/googleworkspace/cli

    gws uses `--params JSON` for API parameters. Use `gws <service> --help` to discover resources.

    | Command | What it does |
    |---------|-------------|
    | `gws gmail users messages list --params '{"userId":"me","maxResults":5}'` | List emails |
    | `gws gmail users messages get --params '{"userId":"me","id":"MSG_ID"}'` | Read email |
    | `gws gmail users messages send --params '{"userId":"me"}' --json '{"raw":"BASE64"}'` | Send email |
    | `gws calendar events list --params '{"calendarId":"primary"}'` | List events |
    | `gws calendar events insert --params '{"calendarId":"primary"}' --json '{"summary":"X","start":{"dateTime":"Y"},"end":{"dateTime":"Z"}}'` | Create event |
    | `gws drive files list` | List Drive files |
    | `gws drive files get --params '{"fileId":"ID"}'` | Get file metadata |
    | `gws docs documents get --params '{"documentId":"ID"}'` | Read Google Doc |
    | `gws sheets spreadsheets values get --params '{"spreadsheetId":"ID","range":"A1:Z"}'` | Read sheet |
    | `gws tasks tasks list --params '{"tasklist":"@default"}'` | List tasks |
    | `gws people people connections list --params '{"resourceName":"people/me","personFields":"names,emailAddresses"}'` | List contacts |

    Available services: gmail, calendar, drive, docs, sheets, slides, tasks, people, chat, forms, keep, meet, events, classroom.
    Discover any API: `gws <service> --help` or `gws schema <service>`.

    ## GitHub CLI (gh)
    Account: `nsudhanva`. Authenticated via GH_TOKEN.

    | Command | What it does |
    |---------|-------------|
    | `gh repo list` | List repos |
    | `gh pr list --repo X` | List PRs |
    | `gh issue list --repo X` | List issues |
    | `gh api /user` | GitHub API |

    ## Google Places (goplaces)
    API key configured via GOOGLE_PLACES_API_KEY.

    | Command | What it does |
    |---------|-------------|
    | `goplaces search "coffee near Times Square"` | Search places |
    | `goplaces nearby --lat X --lng Y --type restaurant` | Find nearby |
    | `goplaces details --place-id X` | Get details |

    ## Browser (Chromium)
    Headless Chrome installed at /usr/bin/chromium. Use the browser tool for:
    - Navigating websites with JavaScript
    - Taking screenshots
    - Filling forms and clicking buttons
    - Extracting data from dynamic pages

    ## Sending Files, Images, and Screenshots via Telegram
    Browser screenshots are saved to `~/.openclaw/media/browser/`.
    To send a screenshot or any file to the user, use the `message send` command with `--media`:
    ```
    openclaw message send --channel telegram --target <chatId> --message "caption" --media /home/node/.openclaw/media/browser/<filename>
    ```
    Example workflow for screenshots:
    1. Take screenshot: `openclaw browser screenshot` (returns path like `MEDIA:~/.openclaw/media/browser/abc.png`)
    2. Send it: `openclaw message send --channel telegram --target <chatId> -m "Here is the screenshot" --media /home/node/.openclaw/media/browser/abc.png`

    The `--media` flag accepts local file paths OR URLs. Use `--force-document` to avoid Telegram compression.
    Trusted local paths: `/home/node/.openclaw/media/`, `/tmp/openclaw/`, `/home/node/.openclaw/workspace/`

    To send an image FROM a webpage (not a screenshot):
    1. Get the image URL from the page source or snapshot
    2. Download it: `wget -O /tmp/openclaw/image.jpg "https://example.com/photo.jpg"`
    3. Send it: `openclaw message send --channel telegram --target <chatId> -m "caption" --media /tmp/openclaw/image.jpg`
    OR send the URL directly (no download needed):
    - `openclaw message send --channel telegram --target <chatId> -m "caption" --media "https://example.com/photo.jpg"`

    ## Web Fetch
    Quick HTTP page retrieval (no JS). Best for articles, docs, simple pages.
  USER.md: |
    # About Sudhanva

    - **Name:** Sudhanva Narayana
    - **Email:** nsudhanva@gmail.com
    - **GitHub:** nsudhanva
    - **Timezone:** US Eastern (ET)
    - **What to call them:** Sudhanva
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: default
  labels:
    app: openclaw
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: openclaw
  template:
    metadata:
      labels:
        app: openclaw
    spec:
      hostAliases:
        - ip: "127.0.0.1"
          hostnames:
            - "chromium-local"
      securityContext:
        fsGroup: 1000
        runAsUser: 1000
        runAsGroup: 1000
      initContainers:
        - name: copy-config
          image: ghcr.io/nsudhanva/openclaw:latest
          command:
            - sh
            - -c
            - |
              mkdir -p /home/node/.openclaw
              cp /config/openclaw.json /home/node/.openclaw/openclaw.json
              cp /config/AGENTS.md /home/node/.openclaw/AGENTS.md
              cp /config/TOOLS.md /home/node/.openclaw/workspace/TOOLS.md 2>/dev/null || true
              cp /config/USER.md /home/node/.openclaw/workspace/USER.md 2>/dev/null || true
              rm -f /home/node/.openclaw/agents/main/agent/models.json
              find /home/node/.openclaw/browser -name "Singleton*" -delete 2>/dev/null || true
              TG_TOKEN=$(cat /secrets/telegram-bot-token)
              export TG_TOKEN
              node -e "
              const fs = require('fs');
              const cfg = JSON.parse(fs.readFileSync('/home/node/.openclaw/openclaw.json'));
              cfg.channels.telegram.botToken = process.env.TG_TOKEN;
              if (!cfg.meta) cfg.meta = {};
              cfg.meta.lastTouchedVersion = '2026.4.11';
              fs.writeFileSync('/home/node/.openclaw/openclaw.json', JSON.stringify(cfg, null, 2));
              " || true
          env:
            - name: HOME
              value: /home/node
            - name: OPENCLAW_CONFIG_DIR
              value: /home/node/.openclaw
          volumeMounts:
            - name: home
              mountPath: /home/node
            - name: config
              mountPath: /config
            - name: telegram-token
              mountPath: /secrets
              readOnly: true
            - name: tmp
              mountPath: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      containers:
        - name: openclaw
          image: ghcr.io/nsudhanva/openclaw:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 18789
              name: http
          env:
            - name: TZ
              value: "America/New_York"
            - name: NODE_OPTIONS
              value: "--dns-result-order=ipv4first"
            - name: HOME
              value: /home/node
            - name: OPENCLAW_CONFIG_DIR
              value: /home/node/.openclaw
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: gemini-api-key
                  key: api-key
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: gateway-token
            - name: GH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: github-pat
                  key: github-pat
                  optional: true
            - name: GOOGLE_PLACES_API_KEY
              valueFrom:
                secretKeyRef:
                  name: google-places-api-key
                  key: api-key
                  optional: true
            - name: DISCORD_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: discord-bot-token
                  key: token
                  optional: true
            - name: GOOGLE_WORKSPACE_CLI_KEYRING_BACKEND
              value: "file"
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "4Gi"
              cpu: "2000m"
          volumeMounts:
            - name: home
              mountPath: /home/node
            - name: tmp
              mountPath: /tmp
            - name: dshm
              mountPath: /dev/shm
            - name: telegram-token
              mountPath: /secrets
              readOnly: true
          startupProbe:
            exec:
              command: ["wget", "-q", "--spider", "http://127.0.0.1:18789/healthz"]
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            exec:
              command: ["wget", "-q", "--spider", "http://127.0.0.1:18789/healthz"]
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["wget", "-q", "--spider", "http://127.0.0.1:18789/readyz"]
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: home
          persistentVolumeClaim:
            claimName: openclaw-home
        - name: tmp
          emptyDir: {}
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi
        - name: config
          configMap:
            name: openclaw-config
        - name: telegram-token
          secret:
            secretName: telegram-bot-token
