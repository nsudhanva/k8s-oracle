apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openclaw-home
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
  storageClassName: oci-bv
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config
  namespace: default
data:
  openclaw.json: |
    {
      "gateway": {
        "mode": "local",
        "port": 18789
      },
      "models": {
        "mode": "merge",
        "providers": {
          "gemma": {
            "baseUrl": "http://gemma.default.svc.cluster.local/v1",
            "apiKey": "${GEMMA_API_KEY}",
            "api": "openai-completions",
            "models": [
              {
                "id": "gemma-4-E2B-it",
                "name": "Gemma 4 E2B",
                "contextWindow": 16384,
                "maxTokens": 2048
              }
            ]
          }
        }
      },
      "agents": {
        "defaults": {
          "model": {
            "primary": "gemma/gemma-4-E2B-it"
          },
          "timeoutSeconds": 900,
          "compaction": {
            "reserveTokensFloor": 20000
          }
        }
      },
      "channels": {
        "telegram": {
          "enabled": true,
          "dmPolicy": "pairing"
        }
      }
    }
  AGENTS.md: |
    Be concise.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: default
  labels:
    app: openclaw
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: openclaw
  template:
    metadata:
      labels:
        app: openclaw
    spec:
      securityContext:
        fsGroup: 1000
        runAsUser: 1000
        runAsGroup: 1000
      initContainers:
        - name: copy-config
          image: ghcr.io/openclaw/openclaw:2026.4.9
          command:
            - sh
            - -c
            - |
              mkdir -p /home/node/.openclaw
              cp /config/openclaw.json /home/node/.openclaw/openclaw.json
              cp /config/AGENTS.md /home/node/.openclaw/AGENTS.md
              TOKEN=$(cat /secrets/telegram-bot-token)
              openclaw channels add --channel telegram --token "$TOKEN" 2>/dev/null || true
          env:
            - name: HOME
              value: /home/node
            - name: OPENCLAW_CONFIG_DIR
              value: /home/node/.openclaw
          volumeMounts:
            - name: home
              mountPath: /home/node
            - name: config
              mountPath: /config
            - name: telegram-token
              mountPath: /secrets
              readOnly: true
            - name: tmp
              mountPath: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      containers:
        - name: openclaw
          image: ghcr.io/openclaw/openclaw:2026.4.9
          ports:
            - containerPort: 18789
              name: http
          env:
            - name: HOME
              value: /home/node
            - name: OPENCLAW_CONFIG_DIR
              value: /home/node/.openclaw
            - name: GEMMA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: gemma-api-key
                  key: api-key
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: gateway-token
          resources:
            requests:
              memory: "512Mi"
              cpu: "100m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          volumeMounts:
            - name: home
              mountPath: /home/node
            - name: tmp
              mountPath: /tmp
            - name: telegram-token
              mountPath: /secrets
              readOnly: true
          startupProbe:
            exec:
              command: ["wget", "-q", "--spider", "http://127.0.0.1:18789/healthz"]
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            exec:
              command: ["wget", "-q", "--spider", "http://127.0.0.1:18789/healthz"]
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["wget", "-q", "--spider", "http://127.0.0.1:18789/readyz"]
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: home
          persistentVolumeClaim:
            claimName: openclaw-home
        - name: tmp
          emptyDir: {}
        - name: config
          configMap:
            name: openclaw-config
        - name: telegram-token
          secret:
            secretName: telegram-bot-token
